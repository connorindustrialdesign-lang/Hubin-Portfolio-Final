<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fine Arts Project 3 - Connor's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body[data-page="fine-arts"] {
            padding-top: 64px;
            background: #fafaf8;
        }

        body[data-page="fine-arts"] .site-header {
            display: none !important;
        }

        body[data-page="fine-arts"] .category-bar {
            top: 0 !important;
            position: fixed !important;
            z-index: 1002 !important;
        }

        .project-header {
            padding: 60px 40px 40px;
            text-align: center;
        }

        .project-header h1 {
            font-size: 48px;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .project-header p {
            font-size: 18px;
            color: #666;
            margin: 0;
        }

        .back-link {
            display: inline-block;
            padding: 10px 20px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            margin: 40px;
            transition: background 0.3s;
        }

        .back-link:hover {
            background: #333;
        }

        .project-gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 40px;
            background: #fafaf8;
        }

        .gallery-hero {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 4 / 3;
            border-radius: 8px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        /* Tablet breakpoint */
        @media (max-width: 1024px) {
            .project-header {
                padding: 50px 30px 30px;
            }

            .project-header h1 {
                font-size: 40px;
            }

            .project-header p {
                font-size: 16px;
            }

            .project-gallery {
                padding: 60px 30px;
            }

            .gallery-hero {
                max-width: 900px;
            }
        }

        /* Mobile: single column stack */
        @media (max-width: 768px) {
            body[data-page="fine-arts"] {
                padding-top: 56px;
            }

            .project-header {
                padding: 40px 20px 20px;
            }

            .project-header h1 {
                font-size: 32px;
            }

            .project-header p {
                font-size: 16px;
            }

            .project-gallery {
                min-height: auto;
                padding: 40px 20px;
            }

            .gallery-hero {
                aspect-ratio: 1;
            }
        }

        /* Extra small phones */
        @media (max-width: 480px) {
            body[data-page="fine-arts"] {
                padding-top: 48px;
            }

            .project-header {
                padding: 30px 16px 16px;
            }

            .project-header h1 {
                font-size: 24px;
                margin: 0 0 8px 0;
            }

            .project-header p {
                font-size: 14px;
            }

            .project-gallery {
                min-height: auto;
                padding: 30px 16px;
            }

            .gallery-hero {
                aspect-ratio: 1;
                max-width: 100%;
                border-radius: 4px;
            }
        }
    </style>
</head>
<body data-page="fine-arts">
    <header class="site-header">
        <div class="header-inner container">
            <h1 class="site-name"><a href="index.html">Connor Hubin</a></h1>
            <nav class="header-nav">
                <a href="about.html" class="nav-about" title="Details">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10.5"/>
                        <circle cx="12" cy="8" r="1.5"/>
                        <path d="M12 11v6"/>
                    </svg>
                </a>
            </nav>
        </div>
    </header>

    <nav class="category-bar" aria-label="Top categories">
        <a href="portfolio-wheel.html#industrial-design" data-category="industrial-design">Industrial Design</a>
        <a href="portfolio-wheel.html#engineering" data-category="engineering">Engineering</a>
        <a href="portfolio-wheel.html#fabrication" data-category="fabrication">Fabrication</a>
        <a href="portfolio-wheel.html#fine-arts" data-category="fine-arts">Fine Arts</a>
    </nav>

    <div class="project-header">
        <h1>Wave</h1>
        <p>Fluid forms and dynamic movement</p>
    </div>

    <div class="project-gallery">
        <div class="gallery-row" style="display:flex;flex-wrap:wrap;gap:32px;justify-content:center;align-items:stretch;margin-bottom:32px;">
            <div class="gallery-item" style="flex:1 1 420px;max-width:520px;min-width:220px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:8px;overflow:hidden;">
                <picture><source srcset="https://deovv8pnl76k0.cloudfront.net/images/wave/wave-indexpage.JPG"><img src="assets/images/wave/wave-indexpage.JPG" alt="Wave 3" style="width:100%;height:auto;object-fit:contain;display:block;"></picture>
            </div>
            <div class="gallery-item" style="flex:1 1 420px;max-width:520px;min-width:220px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:8px;overflow:hidden;">
                <picture><source srcset="https://deovv8pnl76k0.cloudfront.net/images/wave/wave%20-%20old.png"><img src="assets/images/wave/wave - old.png" alt="Wave 4" style="width:100%;height:auto;object-fit:contain;display:block;"></picture>
            </div>
        </div>
        <div class="gallery-item" style="width:100vw;max-width:100vw;overflow:hidden;margin:0 auto 32px auto;">
            <video autoplay loop muted playsinline style="width:100vw;max-width:100vw;display:block;border-radius:0;box-shadow:none;">
                <source src="https://deovv8pnl76k0.cloudfront.net/images/wave/wave-vid.mp4" type="video/mp4">
                <source src="https://deovv8pnl76k0.cloudfront.net/images/wave/wave-vid.mov" type="video/quicktime">
            </video>
        </div>
    </div>

    <script src="script.js?v=20260308b"></script>

</body>
</html>
