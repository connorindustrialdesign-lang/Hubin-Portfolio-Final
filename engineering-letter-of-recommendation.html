<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Letters of Recommendation — Connor Hubin</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body { background: #1a1a1a; position: relative; }
      .letter-overlay { position: fixed; inset: 0; display: block; background: rgba(0,0,0,0.005); z-index: 1; }
      .letter-wrap { position: relative; z-index: 2; max-width: 920px; margin: 0 auto; padding: 40px 20px 80px; }
      .back-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
      .back-nav a { display: inline-flex; align-items: center; gap: 8px; color: #5B8FD4; text-decoration: none; font-size: 16px; font-weight: 500; transition: color 0.3s; }
      .back-nav a:hover { color: #7aa5e8; }
      .back-arrow { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: rgba(91, 143, 212, 0.1); }
      .back-arrow svg { width: 16px; height: 16px; }
      .letter-image-container { max-width: 860px; margin: 0 auto 48px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
      .letter-image-container img { width: 100%; height: auto; display: block; }
      @media (max-width: 768px) {
        .letter-wrap { padding: 30px 16px 60px; }
        .back-nav { margin-bottom: 20px; }
      }
    </style>
  </head>
  <body data-page="letter-recommendation">
    <header class="site-header">
      <div class="header-inner container">
        <h1 class="site-name"><a href="index.html">Connor Hubin</a></h1>
      </div>
    </header>

    <a class="letter-overlay" href="about.html" aria-label="Back to Details"></a>

    <div class="letter-wrap">
      <div class="back-nav">
        <a href="about.html">
          <span class="back-arrow">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 19l-7-7 7-7"></path>
            </svg>
          </span>
          Back to Details
        </a>
      </div>

      <div class="letter-image-container">
        <picture>
          <source srcset="https://deovv8pnl76k0.cloudfront.net/images/engineering%201%20%26%202/CH%20Letter%20of%20Recommendation%20-%20Professional%203-2026.jpg">
          <img src="assets/images/engineering 1 & 2/CH Letter of Recommendation - Professional 3-2026.jpg" alt="Letter of Recommendation – Engineering Design 1 & 2">
        </picture>
      </div>

      <div class="letter-image-container">
        <picture>
          <source srcset="https://deovv8pnl76k0.cloudfront.net/images/shope/cad%20drawings%20-%20Shope/letter-display.png">
          <img src="assets/images/shope/cad drawings - Shope/letter-display.png" alt="Letter of Recommendation – Shope Concrete Products">
        </picture>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
